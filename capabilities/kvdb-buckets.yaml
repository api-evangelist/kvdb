naftiko: 1.0.0-alpha2
info:
  label: KVdb API — Buckets
  description: 'KVdb API — Buckets. 3 operations. Lead operation: Create bucket. Self-contained Naftiko capability covering
    one Kvdb business surface.'
  tags:
  - Kvdb
  - Buckets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KVDB_API_KEY: KVDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: kvdb-buckets
    baseUri: https://kvdb.io
    description: KVdb API — Buckets business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: createbucket
        method: POST
        description: Create bucket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: bucket_id
      path: /{bucket_id}
      operations:
      - name: updatebucket
        method: PATCH
        description: Update bucket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletebucket
        method: DELETE
        description: Delete bucket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: secret_key
      value: '{{env.KVDB_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: kvdb-buckets-rest
    port: 8080
    description: REST adapter for KVdb API — Buckets. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: createbucket
        description: Create bucket
        call: kvdb-buckets.createbucket
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{bucket-id}
      name: bucket-id
      description: REST surface for bucket_id.
      operations:
      - method: PATCH
        name: updatebucket
        description: Update bucket
        call: kvdb-buckets.updatebucket
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletebucket
        description: Delete bucket
        call: kvdb-buckets.deletebucket
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kvdb-buckets-mcp
    port: 9090
    transport: http
    description: MCP adapter for KVdb API — Buckets. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-bucket
      description: Create bucket
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: kvdb-buckets.createbucket
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-bucket
      description: Update bucket
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kvdb-buckets.updatebucket
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-bucket
      description: Delete bucket
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kvdb-buckets.deletebucket
      outputParameters:
      - type: object
        mapping: $.

        mapping: $.
    - name: get-key-value
      description: Get key value
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kvdb-keys.getkey
      outputParameters:
      - type: object
        mapping: $.
    - name: set-key-value
      description: Set key value
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: kvdb-keys.setkey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: increment-decrement-numeric-value
      description: Increment or decrement numeric value
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: kvdb-keys.patchkey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-key
      description: Delete key
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: kvdb-keys.deletekey
      outputParameters:
      - type: object
        mapping: $.

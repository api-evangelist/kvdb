    name: KVdb
    description: >-
      KVdb provides a hosted, serverless key-value database accessible over a
      simple REST API. Operations include creating and managing buckets,
      setting and retrieving values, atomic numeric increments, prefix-based
      key listing, and uploading and executing custom Lua scripts.

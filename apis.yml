aid: kvdb
name: KVdb
description: >-
  Stop wasting time setting up NoSQL databases. KVdb is a hosted serverless
  key-value database with a simple HTTPS REST API. Buckets act as namespaces
  for keys, with built-in access control via secret, read, and write keys,
  custom Lua scripts, and per-bucket TTLs.
